<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Desinx — Seu Protocolo Pessoal</title>
  <meta name="theme-color" content="#0A7B83">
  <style>
/* =============================================
   Protocolo Desinx — App Styles v2
   Coach Pessoal Completo
   ============================================= */

@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:wght@700&display=swap');

:root {
  --primary: #0A7B83;
  --primary-10: #0a7b8318;
  --primary-20: #0a7b8330;
  --accent: #17B8A2;
  --bg: #FAFAF8;
  --bg-card: #FFFFFF;
  --text: #1A1D21;
  --text-2: #4B5563;
  --text-3: #9CA3AF;
  --border: #F0EEEB;
  --border-2: #E5E3DF;
  --success: #22C55E;
  --success-bg: #22c55e14;
  --warn: #F59E0B;
  --warn-bg: #f59e0b14;
  --danger: #EF4444;
  --shadow-1: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-2: 0 4px 16px rgba(0,0,0,0.06);
  --shadow-3: 0 8px 30px rgba(0,0,0,0.1);
  --r: 16px;
  --r-sm: 12px;
  --r-xs: 8px;
  --font: 'DM Sans', system-ui, -apple-system, sans-serif;
  --font-d: 'Playfair Display', Georgia, serif;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; -webkit-text-size-adjust:100%; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding-bottom: 80px;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.app {
  max-width: 500px;
  margin: 0 auto;
  padding: 0 16px;
}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
  z-index: 100;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  background: none;
  border: none;
  padding: 6px 14px;
  cursor: pointer;
  color: var(--text-3);
  font-family: var(--font);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.02em;
  transition: color .2s;
  -webkit-tap-highlight-color: transparent;
}
.nav-item.active { color: var(--primary); }
.nav-item svg { transition: transform .2s; }
.nav-item.active svg { transform: scale(1.08); }

/* ===== ONBOARDING ===== */
.onboarding {
  min-height: calc(100dvh - 40px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  text-align: center;
}

.onb-progress-bar {
  width: 100%;
  max-width: 240px;
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 16px;
}
.onb-progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 4px;
  transition: width .4s ease;
}

.onb-step-counter {
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 24px;
}

.onb-emoji {
  font-size: 48px;
  margin-bottom: 16px;
}

.onb-question {
  font-family: var(--font-d);
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 28px;
  line-height: 1.3;
}

.onb-options {
  width: 100%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.onb-input {
  width: 100%;
  padding: 16px;
  border: 2px solid var(--border);
  border-radius: var(--r-sm);
  font-family: var(--font);
  font-size: 16px;
  text-align: center;
  outline: none;
  transition: border-color .2s;
  background: var(--bg-card);
  margin-bottom: 16px;
}
.onb-input:focus { border-color: var(--primary); }

.onb-option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--r-sm);
  cursor: pointer;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  transition: all .2s;
  -webkit-tap-highlight-color: transparent;
  text-align: left;
}
.onb-option:active { transform: scale(0.98); }
.onb-option.selected {
  border-color: var(--primary);
  background: var(--primary-10);
  color: var(--primary);
}
.onb-option-emoji { font-size: 22px; }

.onb-measures {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
  text-align: left;
}
.onb-field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-2);
  margin-bottom: 6px;
}
.onb-field input {
  width: 100%;
  padding: 14px;
  border: 2px solid var(--border);
  border-radius: var(--r-xs);
  font-family: var(--font);
  font-size: 16px;
  outline: none;
  background: var(--bg-card);
  transition: border-color .2s;
}
.onb-field input:focus { border-color: var(--primary); }

.onb-result-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  margin-bottom: 20px;
  text-align: left;
  width: 100%;
  max-width: 360px;
}
.onb-result-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  color: var(--text-2);
}
.onb-result-row:last-child { border-bottom: none; }
.onb-result-row strong { color: var(--text); }
.onb-result-row.highlight {
  background: var(--primary-10);
  margin: 4px -12px;
  padding: 12px;
  border-radius: var(--r-xs);
  border-bottom: none;
}
.onb-result-row.highlight strong { color: var(--primary); font-size: 16px; }

.onb-disclaimer {
  font-size: 11px;
  color: var(--text-3);
  margin-bottom: 20px;
}

/* ===== BUTTONS ===== */
.btn-primary {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: var(--r-sm);
  background: var(--primary);
  color: white;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:active { transform: scale(0.98); opacity: 0.9; }
.btn-primary.btn-large { padding: 18px; font-size: 16px; border-radius: var(--r); }
.btn-primary.btn-done { background: var(--success); }

.btn-text {
  background: none;
  border: none;
  color: var(--text-3);
  font-family: var(--font);
  font-size: 14px;
  cursor: pointer;
  padding: 12px;
  margin-top: 8px;
}
.btn-text-sm {
  background: none;
  border: none;
  color: var(--primary);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  padding: 0;
}
.btn-text-danger {
  background: none;
  border: none;
  color: var(--danger);
  font-family: var(--font);
  font-size: 13px;
  cursor: pointer;
  text-align: center;
  width: 100%;
  padding: 8px;
  opacity: 0.6;
}

.btn-see-all {
  width: 100%;
  padding: 14px;
  background: var(--primary-10);
  border: 1px dashed var(--primary-20);
  border-radius: var(--r-sm);
  color: var(--primary);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

.btn-measure {
  width: 100%;
  padding: 16px;
  background: var(--bg-card);
  border: 2px dashed var(--border-2);
  border-radius: var(--r);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-2);
  transition: all .2s;
}
.btn-measure:active { border-color: var(--primary); color: var(--primary); }

/* ===== HOME ===== */
.home-header {
  padding: 20px 0 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.home-greeting { font-size: 13px; color: var(--text-2); }
.home-name {
  font-family: var(--font-d);
  font-size: 22px;
  font-weight: 700;
  margin-top: 2px;
}
.home-day-badge {
  padding: 6px 14px;
  border-radius: 99px;
  color: white;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.02em;
}

/* Phase Banner */
.phase-banner {
  padding: 20px;
  border-radius: var(--r);
  background: var(--phase-color);
  color: white;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}
.phase-banner::after {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
}
.phase-banner-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.phase-badge {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  background: rgba(255,255,255,0.2);
  padding: 3px 10px;
  border-radius: 99px;
}
.phase-week { font-size: 12px; opacity: 0.8; }
.phase-banner-title {
  font-family: var(--font-d);
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 4px;
}
.phase-banner-desc { font-size: 13px; opacity: 0.85; line-height: 1.4; }

/* Today Overview */
.today-overview {
  display: flex;
  gap: 16px;
  margin-bottom: 20px;
  align-items: center;
}
.today-ring {
  flex-shrink: 0;
  position: relative;
  width: 90px; height: 90px;
}
.today-ring-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
}
.today-stats {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.today-stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.today-stat-val { font-size: 14px; font-weight: 700; }
.today-stat-label { font-size: 12px; color: var(--text-3); }

/* Quote */
.quote-card {
  padding: 18px;
  background: var(--primary-10);
  border-radius: var(--r);
  border-left: 4px solid var(--primary);
  margin-bottom: 20px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.quote-icon { font-size: 18px; flex-shrink: 0; }
.quote-text {
  font-family: var(--font-d);
  font-size: 15px;
  font-weight: 700;
  line-height: 1.5;
  color: var(--text);
  font-style: italic;
}

/* Section Header */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  font-size: 15px;
  font-weight: 700;
}

/* Quick Tasks */
.quick-tasks {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 20px;
}

.quick-task {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: all .2s;
  -webkit-tap-highlight-color: transparent;
}
.quick-task:active { transform: scale(0.99); }
.quick-task.done {
  opacity: 0.5;
  background: var(--success-bg);
  border-color: var(--success);
}

.qt-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border-2);
  flex-shrink: 0;
  transition: all .2s;
}
.qt-check.checked {
  background: var(--success);
  border-color: var(--success);
  position: relative;
}
.qt-check.checked::after {
  content: '✓';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 11px;
  font-weight: 700;
}

.qt-emoji { font-size: 18px; flex-shrink: 0; }
.qt-info { flex: 1; min-width: 0; }
.qt-title { font-size: 13px; font-weight: 600; line-height: 1.3; }
.quick-task.done .qt-title { text-decoration: line-through; color: var(--text-2); }
.qt-meta { font-size: 11px; color: var(--text-3); margin-top: 1px; }

.qt-swap {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--text-3);
  transition: all .2s;
}
.qt-swap:active { background: var(--primary-10); color: var(--primary); }

.qt-arrow {
  font-size: 20px;
  color: var(--text-3);
  flex-shrink: 0;
}

/* Congrats */
.congrats-card {
  display: flex;
  gap: 12px;
  padding: 16px;
  background: var(--success-bg);
  border: 1px solid #22c55e40;
  border-radius: var(--r);
  margin-bottom: 20px;
  font-size: 13px;
  line-height: 1.5;
  align-items: center;
}
.congrats-card span { font-size: 28px; flex-shrink: 0; }

/* ===== PLAN VIEW ===== */
.plan-header {
  text-align: center;
  padding: 20px 0 12px;
}
.plan-day {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.plan-title {
  font-family: var(--font-d);
  font-size: 24px;
  font-weight: 700;
  margin-top: 4px;
}

.cal-summary {
  text-align: center;
  padding: 10px;
  background: var(--warn-bg);
  border-radius: var(--r-xs);
  font-size: 13px;
  font-weight: 600;
  color: #92400E;
  margin-bottom: 16px;
}

.plan-category {
  margin-bottom: 20px;
}
.plan-cat-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-2);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.plan-task {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  margin-bottom: 6px;
  cursor: pointer;
  transition: all .2s;
  -webkit-tap-highlight-color: transparent;
}
.plan-task:active { transform: scale(0.99); }
.plan-task.done { opacity: 0.5; background: var(--success-bg); border-color: var(--success); }

.pt-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border-2);
  flex-shrink: 0;
  margin-top: 1px;
  transition: all .2s;
}
.pt-check.checked {
  background: var(--success);
  border-color: var(--success);
  position: relative;
}
.pt-check.checked::after {
  content: '✓';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 11px;
  font-weight: 700;
}

.pt-emoji { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.pt-content { flex: 1; min-width: 0; }
.pt-title { font-size: 14px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
.plan-task.done .pt-title { text-decoration: line-through; }
.pt-desc { font-size: 12px; color: var(--text-2); line-height: 1.5; }
.pt-meta { font-size: 11px; color: var(--text-3); margin-top: 4px; font-weight: 500; }
.pt-swap {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg);
  font-size: 14px;
  cursor: pointer;
  flex-shrink: 0;
  color: var(--text-3);
}

/* Water Tracker */
.water-tracker {
  padding: 20px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: 24px;
}
.water-label {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
}
.water-glasses {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.water-glass {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--text-3);
  cursor: pointer;
  transition: all .2s;
}
.water-glass.filled {
  border-color: #0A7B83;
  background: #0a7b8318;
  font-size: 16px;
}

/* ===== MEALS VIEW ===== */
.meals-header {
  text-align: center;
  padding: 20px 0 12px;
}
.meals-header h2 {
  font-family: var(--font-d);
  font-size: 22px;
}
.meals-sub {
  font-size: 13px;
  color: var(--text-2);
  margin-top: 4px;
}

.meals-today { margin-bottom: 24px; }
.meals-today-label {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 10px;
}

.meal-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 10px;
  transition: all .2s;
}
.meal-card.done { opacity: 0.5; border-color: var(--success); }

.meal-card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.meal-emoji { font-size: 24px; flex-shrink: 0; }
.meal-type { font-size: 11px; color: var(--text-3); text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; }
.meal-time { font-weight: 400; }
.meal-name { font-size: 15px; font-weight: 600; margin-top: 2px; }
.meal-swap-btn {
  margin-left: auto;
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg);
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
  color: var(--text-3);
}
.meal-desc { font-size: 13px; color: var(--text-2); line-height: 1.5; margin-bottom: 10px; }
.meal-meta {
  display: flex;
  gap: 12px;
  font-size: 11px;
  color: var(--text-3);
  font-weight: 500;
  margin-bottom: 10px;
}
.btn-meal-done {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: var(--r-xs);
  background: var(--bg);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-2);
  transition: all .2s;
}
.btn-meal-done.checked {
  background: var(--success-bg);
  border-color: var(--success);
  color: var(--success);
}

/* Week Grid */
.meals-week-label {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 10px;
}
.meals-week-grid {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 12px;
  -webkit-overflow-scrolling: touch;
}
.meals-week-grid::-webkit-scrollbar { display: none; }
.week-day-card {
  min-width: 130px;
  padding: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  flex-shrink: 0;
}
.week-day-card.current { border-color: var(--primary); border-width: 2px; }
.week-day-card.future { opacity: 0.4; }
.wdc-day { font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--text-2); }
.wdc-meal { font-size: 11px; color: var(--text-2); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ===== PROGRESS VIEW ===== */
.progress-header {
  text-align: center;
  padding: 20px 0 12px;
}
.progress-header h2 {
  font-family: var(--font-d);
  font-size: 22px;
}

.streak-banner {
  text-align: center;
  padding: 24px;
  background: linear-gradient(135deg, var(--phase-color), var(--accent));
  border-radius: var(--r);
  color: white;
  margin-bottom: 20px;
}
.streak-num {
  font-family: var(--font-d);
  font-size: 48px;
  font-weight: 700;
  line-height: 1;
}
.streak-lbl { font-size: 13px; opacity: 0.85; margin-top: 4px; }

/* Weight Chart */
.weight-chart {
  display: flex;
  gap: 8px;
  padding: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  margin-bottom: 12px;
}
.chart-labels {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-3);
  padding: 4px 0;
}
.chart-svg { flex: 1; }

.weight-summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}
.ws-item {
  text-align: center;
  padding: 12px 4px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-xs);
}
.ws-item.highlight { background: var(--primary-10); border-color: var(--primary); }
.ws-val { font-size: 14px; font-weight: 700; }
.ws-item.highlight .ws-val { color: var(--primary); }
.ws-lbl { font-size: 10px; color: var(--text-3); margin-top: 2px; }

/* Calendar */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  margin-bottom: 20px;
}
.cal-lbl {
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  padding: 4px 0;
}
.cal-d {
  aspect-ratio: 1;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-2);
}
.cal-d.current { border: 2px solid var(--primary); color: var(--primary); }
.cal-d.complete { background: var(--success); border-color: var(--success); color: white; }
.cal-d.partial { background: var(--warn-bg); border-color: var(--warn); color: #92400E; }
.cal-d.locked { opacity: 0.3; }

/* Phase Rows */
.phases-list { margin-bottom: 20px; }
.phase-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  margin-bottom: 6px;
}
.phase-row-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.phase-row-info { flex: 1; }
.phase-row-name { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.phase-row-bar {
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.phase-row-bar div {
  height: 100%;
  border-radius: 4px;
  transition: width .6s ease;
}
.phase-row-pct { font-size: 14px; font-weight: 700; flex-shrink: 0; }

/* ===== MODALS ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  transition: background .3s;
}
.modal-overlay.open { background: rgba(0,0,0,0.4); }

.modal-sheet {
  width: 100%;
  max-width: 500px;
  max-height: 85dvh;
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex;
  flex-direction: column;
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }

.modal-handle {
  width: 36px; height: 4px;
  background: var(--border-2);
  border-radius: 4px;
  margin: 12px auto;
  cursor: pointer;
  flex-shrink: 0;
}

.modal-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 0 20px 32px;
  -webkit-overflow-scrolling: touch;
}

.modal-title {
  font-family: var(--font-d);
  font-size: 20px;
  margin-bottom: 8px;
}
.modal-sub { font-size: 13px; color: var(--text-2); margin-bottom: 20px; }

  border-radius: var(--r);
  margin-bottom: 20px;
  text-align: center;
}
.wk-name {
  font-family: var(--font-d);
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
}

.wk-section-title {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-2);
  margin-bottom: 10px;
  margin-top: 8px;
}

.wk-exercise {

  gap: 12px;
  padding: 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  margin-bottom: 6px;
  align-items: flex-start;
}
.wk-exercise.cool { background: var(--primary-10); border-color: transparent; }

  background: var(--primary);
  color: white;

  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;

.wk-ex-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.wk-ex-reps {
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  margin-left: 6px;
}
.wk-ex-desc { font-size: 12px; color: var(--text-2); line-height: 1.5; }
.wk-rest-note {
  text-align: center;
  padding: 12px;
  background: var(--warn-bg);
  border-radius: var(--r-xs);
  font-size: 12px;
  font-weight: 600;
  color: #92400E;
  margin: 12px 0;

.swap-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.swap-desc { font-size: 12px; color: var(--text-2); line-height: 1.4; margin-bottom: 4px; }
.swap-meta { font-size: 11px; color: var(--text-3); font-weight: 500; }

  flex-direction: column;
  gap: 14px;
  margin-bottom: 20px;
}
.m-field label {

  font-weight: 600;
  color: var(--text-2);

.m-field input {

/* ---------- ESTIMATIVAS DE RESULTADO ---------- */
const RESULT_ESTIMATES = {
  // baseado no peso atual e nível de atividade
  getWeeklyLoss(weight, activityLevel) {
    const base = weight * 0.005; // ~0.5% do peso por semana
    const multiplier = activityLevel === 'sedentary' ? 0.8 : activityLevel === 'light' ? 1 : 1.2;
    return Math.round(base * multiplier * 10) / 10;
  },
  getProjection(weight, targetWeight, activityLevel) {
    const weeklyLoss = this.getWeeklyLoss(weight, activityLevel);
    const totalToLose = weight - targetWeight;
    const weeks = Math.ceil(totalToLose / weeklyLoss);
    return { weeklyLoss, weeks, fourWeekLoss: Math.round(weeklyLoss * 4 * 10) / 10 };
  }
};

/* =============================================
   Protocolo Desinx — App Logic v3
   Auth + Coach Pessoal Completo
   ============================================= */

const AUTH_KEY = 'desinx_auth';
const USERS_KEY = 'desinx_users';
const ACCESS_TOKEN = 'DESINX2024ACCESS'; // token secreto — mude quando quiser revogar acessos
const TOKEN_KEY = 'desinx_token_valid';
let appState = null;
let currentView = 'home';
let currentUser = null;
let authScreen = 'login';

/* ============ CONTROLE DE ACESSO ============ */
function checkAccessToken() {
  // Verifica se já validou o token antes neste dispositivo
  if (localStorage.getItem(TOKEN_KEY) === 'true') return true;
  // Verifica se o token veio na URL
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (token === ACCESS_TOKEN) {
    localStorage.setItem(TOKEN_KEY, 'true');
    // Limpa o token da URL sem recarregar a página
    const cleanUrl = window.location.pathname;
    window.history.replaceState({}, document.title, cleanUrl);
    return true;
  }
  return false;
}

function canRegister() {
  return checkAccessToken();
}

/* ============ 0. AUTH SYSTEM ============ */

function getUsers() {
  try { return JSON.parse(localStorage.getItem(USERS_KEY)) || {}; } catch(e) { return {}; }
}
function saveUsers(users) { localStorage.setItem(USERS_KEY, JSON.stringify(users)); }
function getSession() { try { return JSON.parse(localStorage.getItem(AUTH_KEY)); } catch(e) { return null; } }
function saveSession(user) { localStorage.setItem(AUTH_KEY, JSON.stringify(user)); }
function clearSession() { localStorage.removeItem(AUTH_KEY); }

function hashPassword(pw) {
  let hash = 0;
  for (let i = 0; i < pw.length; i++) { const c = pw.charCodeAt(i); hash = ((hash << 5) - hash) + c; hash |= 0; }
  const salt = 'desinx2024';
  for (let i = 0; i < salt.length; i++) { hash = ((hash << 5) - hash) + salt.charCodeAt(i); hash |= 0; }
  return 'dx_' + Math.abs(hash).toString(36);
}

function validateEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }

function registerUser(name, email, password) {
  email = email.toLowerCase().trim();
  if (!name.trim()) return { ok:false, msg:'Informe seu nome' };
  if (!validateEmail(email)) return { ok:false, msg:'Email inválido' };
  if (password.length < 6) return { ok:false, msg:'Senha deve ter pelo menos 6 caracteres' };
  const users = getUsers();
  if (users[email]) return { ok:false, msg:'Este email já está cadastrado' };
  users[email] = { name:name.trim(), email, passwordHash:hashPassword(password), createdAt:new Date().toISOString() };
  saveUsers(users);
  currentUser = { email, name:name.trim() };
  saveSession(currentUser);
  return { ok:true };
}

function loginUser(email, password) {
  email = email.toLowerCase().trim();
  if (!email || !password) return { ok:false, msg:'Preencha todos os campos' };
  const users = getUsers();
  const user = users[email];
  if (!user) return { ok:false, msg:'Email não encontrado' };
  if (user.passwordHash !== hashPassword(password)) return { ok:false, msg:'Senha incorreta' };
  currentUser = { email, name:user.name };
  saveSession(currentUser);
  return { ok:true };
}

function logoutUser() {
  if (confirm('Deseja sair da sua conta?')) {
    clearSession(); currentUser = null; appState = null; render();
  }
}

function changePassword(currentPw, newPw) {
  if (!currentUser) return { ok:false, msg:'Não logado' };
  const users = getUsers();
  const user = users[currentUser.email];
  if (!user) return { ok:false, msg:'Usuário não encontrado' };
  if (user.passwordHash !== hashPassword(currentPw)) return { ok:false, msg:'Senha atual incorreta' };
  if (newPw.length < 6) return { ok:false, msg:'Nova senha deve ter pelo menos 6 caracteres' };
  user.passwordHash = hashPassword(newPw);
  saveUsers(users);
  return { ok:true };
}

/* ============ 1. STATE (per-user) ============ */

function getUserStorageKey() { return currentUser ? 'desinx_data_'+currentUser.email : 'desinx_data_guest'; }
function loadState() { try { const s=localStorage.getItem(getUserStorageKey()); return s?JSON.parse(s):null; } catch(e){return null;} }
function saveState() { if(!appState)return; localStorage.setItem(getUserStorageKey(), JSON.stringify(appState)); }

window.addEventListener('beforeunload', saveState);
document.addEventListener('visibilitychange', () => { if(document.visibilityState==='hidden') saveState(); });
setInterval(saveState, 30000);

function getDefaultState() {
  return { profile:null, startDate:null, completedTasks:{}, swappedMeals:{}, measurements:[], waterLog:{}, journal:{}, currentWeek:1, dayInProtocol:1 };
}

function initState() {
  const session = getSession();
  if (session) { const users=getUsers(); if(users[session.email]) currentUser=session; }
  if (currentUser) { appState = loadState() || getDefaultState(); }
}

/* ============ 2. COMPUTED ============ */

function getDayInProtocol() {
  if(!appState||!appState.startDate)return 1;
  const s=new Date(appState.startDate),t=new Date(); s.setHours(0,0,0,0); t.setHours(0,0,0,0);
  return Math.max(1, Math.floor((t-s)/86400000)+1);
}
function getCurrentPhase() { const w=Math.ceil(getDayInProtocol()/7); return w<=4?PHASES[w-1]:PHASES[4]; }
function getPhaseForDay(day) { const w=Math.ceil(day/7); return w<=4?PHASES[w-1]:PHASES[4]; }
function getDayOfWeek(day) { return ((day-1)%7)+1; }
function isRestDay(day) { return getDayOfWeek(day)===7; }
function isMeasurementDay(day) { return getDayOfWeek(day)===7||day===1; }

function getStreak() {
  const today=getDayInProtocol(); let streak=0;
  for(let d=today;d>=1;d--){ if(isDayFullyComplete(d))streak++; else if(d<today)break; }
  return streak;
}
function isDayFullyComplete(day) { const t=getDayTasks(day); return t.length>0&&t.every(t=>appState.completedTasks[`day${day}_${t.id}`]); }
function getDayCompletionPercent(day) { const t=getDayTasks(day); if(!t.length)return 0; return Math.round(t.filter(x=>appState.completedTasks[`day${day}_${x.id}`]).length/t.length*100); }
function getTotalProgress() {
  const today=getDayInProtocol(); let total=0,done=0;
  for(let d=1;d<=today;d++){const t=getDayTasks(d);total+=t.length;done+=t.filter(x=>appState.completedTasks[`day${d}_${x.id}`]).length;}
  return{total,done,percent:total>0?Math.round(done/total*100):0};
}

/* ============ 3. PLAN GENERATION ============ */

function pickMeal(type,day,phase) {
  const p=appState.profile;
  const sk=`day${day}_${type}`;
  if(appState.swappedMeals[sk]){const m=MEALS_DB[type].find(x=>x.id===appState.swappedMeals[sk]);if(m)return m;}
  let pool=MEALS_DB[type].filter(m=>m.phase.includes(phase.id));
  if(p&&p.restrictions&&p.restrictions.length){
    const f=pool.filter(m=>{
      if(p.restrictions.includes('gluten')&&!m.tags.includes('gluten-free'))return false;
      if(p.restrictions.includes('lactose')&&!m.tags.includes('lactose-free'))return false;
      if(p.restrictions.includes('vegetarian')&&!m.tags.includes('vegetarian')&&!m.tags.includes('vegan'))return false;
      if(p.restrictions.includes('vegan')&&!m.tags.includes('vegan'))return false;
      return true;
    });
    if(f.length)pool=f;
  }
  if(!pool.length)pool=MEALS_DB[type];
  return pool[(day-1)%pool.length];
}

function getWorkout(day) {
  const phase=getPhaseForDay(day), p=appState.profile||{}, time=p.timeAvailable||15;
  const actMap={sedentary:1,light:2,moderate:2,active:3}, level=actMap[p.activityLevel]||1;
  const duration=time<=12?10:time<=17?15:20, phaseId=Math.min(phase.id,5);
  let template=null;
  for(let l=level;l>=1&&!template;l--) for(const d of[duration,15,10,20]){if(WORKOUT_TEMPLATES[`${phaseId}_${d}_${l}`]){template=WORKOUT_TEMPLATES[`${phaseId}_${d}_${l}`];break;}}
  if(!template)template=WORKOUT_TEMPLATES['1_10_1'];
  return{...template, exercises:template.exercises.map(id=>EXERCISES_DB.find(e=>e.id===id)).filter(Boolean), cooldown:template.cooldown.map(id=>EXERCISES_DB.find(e=>e.id===id)).filter(Boolean), duration};
}

function getDayTasks(day) {
  const phase=getPhaseForDay(day),rest=isRestDay(day),tasks=[];
  const hydP=DAILY_PROTOCOLS.hydration.find(h=>h.phase===Math.min(phase.id,4))||DAILY_PROTOCOLS.hydration[0];
  hydP.tasks.forEach((t,i)=>tasks.push({...t,id:`hyd${i}`,category:'hydration'}));
  const br=pickMeal('breakfast',day,phase),lu=pickMeal('lunch',day,phase),di=pickMeal('dinner',day,phase),sn=pickMeal('snacks',day,phase);
  tasks.push({emoji:'🍳',title:br.name,desc:br.desc,id:br.id,category:'meal',mealType:'breakfast',cal:br.cal,prep:br.prep});
  tasks.push({emoji:'🥗',title:lu.name,desc:lu.desc,id:lu.id,category:'meal',mealType:'lunch',cal:lu.cal,prep:lu.prep});
  tasks.push({emoji:'🌙',title:di.name,desc:di.desc,id:di.id,category:'meal',mealType:'dinner',cal:di.cal,prep:di.prep});
  tasks.push({emoji:'🍎',title:sn.name,desc:sn.desc,id:sn.id,category:'meal',mealType:'snacks',cal:sn.cal});
  if(!rest) tasks.push({emoji:'🏋️',title:'Treino do dia',desc:'Toque para ver seu treino personalizado',id:'workout',category:'workout'});
  else tasks.push({emoji:'🧘',title:'Descanso ativo',desc:'Alongamento leve de 10 min ou caminhada tranquila.',id:'rest',category:'workout'});
  const slP=DAILY_PROTOCOLS.sleep.find(s=>s.phase===Math.min(phase.id,4))||DAILY_PROTOCOLS.sleep[0];
  slP.tasks.forEach((t,i)=>tasks.push({...t,id:`sleep${i}`,category:'sleep'}));
  if(isMeasurementDay(day)) tasks.push({emoji:'📏',title:'Dia de medição',desc:'Registre peso e cintura!',id:'measure',category:'measure'});
  return tasks;
}

function getQuoteForDay(day) {
  const phase=getPhaseForDay(day);
  const pq=DAILY_PROTOCOLS.mindset.find(m=>m.phase===Math.min(phase.id,5));
  return pq?pq.quotes[(day-1)%pq.quotes.length]:'';
}

/* ============ 4. NAVIGATION ============ */

function navigate(view) {
  currentView=view;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.view===view));
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ============ 5. MASTER RENDER ============ */

function render() {
  const app=document.getElementById('app'),nav=document.getElementById('bottomNav');
  if(!currentUser){nav.style.display='none';app.innerHTML=renderAuth();return;}
  if(!appState) appState=loadState()||getDefaultState();
  if(!appState.profile){nav.style.display='none';app.innerHTML=renderOnboarding();return;}
  nav.style.display='flex';
  switch(currentView){
    case 'home':app.innerHTML=renderHome();break;
    case 'plan':app.innerHTML=renderPlan();break;
    case 'meals':app.innerHTML=renderMeals();break;
    case 'progress':app.innerHTML=renderProgress();break;
    default:app.innerHTML=renderHome();
  }
}

/* ============ 7. ONBOARDING ============ */

let onboardingStep=0;
const onboardingSteps=[
  {key:'goal',question:'Qual seu principal objetivo?',type:'choice',options:[{value:'lose',label:'Perder peso',emoji:'⬇️'},{value:'define',label:'Definir corpo',emoji:'💪'},{value:'health',label:'Mais saúde e energia',emoji:'✨'},{value:'habit',label:'Criar hábitos saudáveis',emoji:'🎯'}],emoji:'🎯'},
  {key:'activityLevel',question:'Qual seu nível de atividade atual?',type:'choice',options:[{value:'sedentary',label:'Sedentária',emoji:'🛋️'},{value:'light',label:'Atividade leve',emoji:'🚶'},{value:'moderate',label:'Moderada',emoji:'🏃'},{value:'active',label:'Ativa',emoji:'💪'}],emoji:'🏃'},
  {key:'restrictions',question:'Alguma restrição alimentar?',type:'multi',options:[{value:'none',label:'Nenhuma',emoji:'✅'},{value:'gluten',label:'Sem glúten',emoji:'🌾'},{value:'lactose',label:'Sem lactose',emoji:'🥛'},{value:'vegetarian',label:'Vegetariana',emoji:'🥬'},{value:'vegan',label:'Vegana',emoji:'🌱'}],emoji:'🍽️'},
  {key:'timeAvailable',question:'Quanto tempo tem para treinar por dia?',type:'choice',options:[{value:'10',label:'10 minutos',emoji:'⏱️'},{value:'15',label:'15 minutos',emoji:'⏱️'},{value:'20',label:'20 minutos',emoji:'⏱️'},{value:'30',label:'30+ minutos',emoji:'⏱️'}],emoji:'⏰'},
  {key:'measures',question:'Seus dados para personalizar o plano',type:'measures',emoji:'📏'},
];
let onboardingData={};

function renderOnboarding() {
  if(onboardingStep>=onboardingSteps.length)return renderOnboardingComplete();
  const step=onboardingSteps[onboardingStep], progress=Math.round(onboardingStep/onboardingSteps.length*100);
  let content='';
  if(step.type==='choice') content=step.options.map(o=>`<button class="onb-option ${onboardingData[step.key]===o.value?'selected':''}" onclick="onbSelect('${step.key}','${o.value}')"><span class="onb-option-emoji">${o.emoji}</span><span>${o.label}</span></button>`).join('');
  else if(step.type==='multi'){const sel=onboardingData[step.key]||[];content=step.options.map(o=>`<button class="onb-option ${sel.includes(o.value)?'selected':''}" onclick="onbToggle('${step.key}','${o.value}')"><span class="onb-option-emoji">${o.emoji}</span><span>${o.label}</span></button>`).join('')+`<button class="btn-primary" style="margin-top:12px" onclick="onbNext()">Continuar</button>`;}
  else if(step.type==='measures') content=`<div class="onb-measures"><div class="onb-field"><label>Idade</label><input type="number" id="onbAge" value="${onboardingData.age||''}" placeholder="30" inputmode="numeric"></div><div class="onb-field"><label>Altura (cm)</label><input type="number" id="onbHeight" value="${onboardingData.height||''}" placeholder="165" inputmode="numeric"></div><div class="onb-field"><label>Peso atual (kg)</label><input type="number" id="onbWeight" value="${onboardingData.weight||''}" placeholder="75" inputmode="decimal"></div><div class="onb-field"><label>Peso desejado (kg)</label><input type="number" id="onbTarget" value="${onboardingData.targetWeight||''}" placeholder="68" inputmode="decimal"></div></div><button class="btn-primary" onclick="onbSaveMeasures()">Criar meu plano</button>`;
  return `<div class="onboarding fade-in"><div class="onb-progress-bar"><div class="onb-progress-fill" style="width:${progress}%"></div></div><div class="onb-step-counter">${onboardingStep+1} de ${onboardingSteps.length}</div><div class="onb-emoji">${step.emoji}</div><h2 class="onb-question">${step.question}</h2><div class="onb-options">${content}</div>${onboardingStep>0?`<button class="btn-text" onclick="onboardingStep--;render()">← Voltar</button>`:''}</div>`;
}

function onbNext(){onboardingStep++;render();}
function onbSelect(k,v){onboardingData[k]=v;setTimeout(()=>{onboardingStep++;render();},200);}
function onbToggle(k,v){if(!onboardingData[k])onboardingData[k]=[];if(v==='none')onboardingData[k]=['none'];else{onboardingData[k]=onboardingData[k].filter(x=>x!=='none');const i=onboardingData[k].indexOf(v);if(i>=0)onboardingData[k].splice(i,1);else onboardingData[k].push(v);}render();}
function onbSaveMeasures(){const a=parseInt(document.getElementById('onbAge')?.value),h=parseInt(document.getElementById('onbHeight')?.value),w=parseFloat(document.getElementById('onbWeight')?.value),t=parseFloat(document.getElementById('onbTarget')?.value);if(!a||!h||!w||!t){showToast('Preencha todos os campos');return;}onboardingData.age=a;onboardingData.height=h;onboardingData.weight=w;onboardingData.targetWeight=t;onboardingStep++;render();}

function renderOnboardingComplete() {
  const d=onboardingData, restr=(d.restrictions||[]).filter(r=>r!=='none'), est=RESULT_ESTIMATES.getProjection(d.weight,d.targetWeight,d.activityLevel);
  return `<div class="onboarding fade-in" style="text-align:center"><div class="onb-emoji">🎉</div><h2 class="onb-question">${currentUser.name}, seu plano está pronto!</h2><div class="onb-result-card"><div class="onb-result-row"><span>Meta</span><strong>${d.weight}kg → ${d.targetWeight}kg</strong></div><div class="onb-result-row"><span>Estimativa semanal</span><strong>-${est.weeklyLoss}kg/semana</strong></div><div class="onb-result-row highlight"><span>Primeiras 4 semanas</span><strong>-${est.fourWeekLoss}kg</strong></div><div class="onb-result-row"><span>Treino</span><strong>${d.timeAvailable} min/dia</strong></div><div class="onb-result-row"><span>Restrições</span><strong>${restr.length?restr.join(', '):'Nenhuma'}</strong></div></div><p class="onb-disclaimer">*Estimativa baseada no seu perfil.</p><button class="btn-primary btn-large" onclick="finishOnboarding()">Começar meu Protocolo 💧</button></div>`;
}

function finishOnboarding() {
  const d=onboardingData;
  appState.profile={name:currentUser.name,goal:d.goal,activityLevel:d.activityLevel,restrictions:(d.restrictions||[]).filter(r=>r!=='none'),timeAvailable:parseInt(d.timeAvailable)||15,age:d.age,height:d.height,weight:d.weight,targetWeight:d.targetWeight};
  appState.startDate=new Date().toISOString().split('T')[0];
  appState.measurements.push({day:0,date:appState.startDate,weight:appState.profile.weight,waist:null});
  saveState(); navigate('home');
}

/* ============ 8-11. VIEWS (Home, Plan, Meals, Progress) ============ */

button class="btn-see-all" onclick="navigate('plan')">+ ${tasks.length-5} tarefas</button>`:''}</div>${done===total&&total>0?`<div class="congrats-card fade-in"><span>🎉</span><div><strong>Dia completo!</strong><br>Você arrasou hoje.</div></div>`:''}</div>`;
}

}

function renderWaterGlasses(){const today=new Date().toISOString().split('T')[0],count=appState.waterLog[today]||0;return Array.from({length:10},(_,i)=>`<div class="water-glass ${i<count?'filled':''}" onclick="toggleWater(${i+1})">${i<count?'💧':'○'}</div>`).join('');}

function renderMeals() {
  const day=getDayInProtocol(),phase=getCurrentPhase(),mts=[{key:'breakfast',label:'Café da manhã',emoji:'🍳',time:'7-9h'},{key:'lunch',label:'Almoço',emoji:'🥗',time:'12-13h'},{key:'dinner',label:'Jantar',emoji:'🌙',time:'18-19h'},{key:'snacks',label:'Lanche',emoji:'🍎',time:'15-16h'}];

}

function renderProgress() {
  const day=getDayInProtocol(),streak=getStreak(),phase=getCurrentPhase(),p=appState.profile,labels=['S','T','Q','Q','S','S','D'];
  let calH=labels.map(l=>`<div class="cal-lbl">${l}</div>`).join('');
  for(let d=1;d<=Math.max(day,28);d++){const pct=getDayCompletionPercent(d),cls=pct===100?'complete':pct>0?'partial':d===day?'current':d>day?'locked':'';calH+=`<div class="cal-d ${cls}">${d}</div>`;}
  const ms=appState.measurements.filter(m=>m.weight);let ch='';
  if(ms.length>=2){const mx=Math.max(...ms.map(m=>m.weight)),mn=Math.min(...ms.map(m=>m.weight)),rg=mx-mn||1,w=280,h=120;const pts=ms.map((m,i)=>`${(i/(ms.length-1))*w},${h-((m.weight-mn)/rg)*(h-20)}`).join(' ');ch=`<div class="weight-chart"><div class="chart-labels"><span>${mx}kg</span><span>${mn}kg</span></div><svg viewBox="0 0 ${w} ${h}" class="chart-svg"><polyline points="${pts}" fill="none" stroke="${phase.color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${ms.map((m,i)=>{const x=(i/(ms.length-1))*w,y=h-((m.weight-mn)/rg)*(h-20);return `<circle cx="${x}" cy="${y}" r="4" fill="${phase.color}"/>`;}).join('')}</svg></div>`;}
  const ps=PHASES.slice(0,4).map(ph=>{const s=(ph.id-1)*7+1,e=ph.id*7;let tt=0,dn=0;for(let d=s;d<=e;d++){const t=getDayTasks(d);tt+=t.length;dn+=t.filter(x=>appState.completedTasks[`day${d}_${x.id}`]).length;}const pc=tt>0?Math.round(dn/tt*100):0;return `<div class="phase-row"><div class="phase-row-icon" style="background:${ph.color}20;color:${ph.color}">${ph.emoji}</div><div class="phase-row-info"><div class="phase-row-name">${ph.name} <span style="color:var(--text-3)">(Sem ${ph.week})</span></div><div class="phase-row-bar"><div style="width:${pc}%;background:${ph.color}"></div></div></div><div class="phase-row-pct" style="color:${ph.color}">${pc}%</div></div>`;}).join('');
  return `<div class="fade-in"><div class="progress-header"><h2>📊 Seu Progresso</h2></div><div class="streak-banner fade-in-d1" style="--phase-color:${phase.color}"><div class="streak-num">${streak}</div><div class="streak-lbl">dias em sequência 🔥</div></div>${ms.length>=2?`<div class="section-header fade-in-d1"><span>⚖️ Peso</span></div>${ch}<div class="weight-summary fade-in-d2"><div class="ws-item"><div class="ws-val">${ms[0].weight}kg</div><div class="ws-lbl">Início</div></div><div class="ws-item"><div class="ws-val">${ms[ms.length-1].weight}kg</div><div class="ws-lbl">Atual</div></div><div class="ws-item highlight"><div class="ws-val">${getWeightChange()}</div><div class="ws-lbl">Diferença</div></div><div class="ws-item"><div class="ws-val">${p.targetWeight}kg</div><div class="ws-lbl">Meta</div></div></div>`:''}<div class="section-header fade-in-d2"><span>📅 Calendário</span></div><div class="calendar fade-in-d2">${calH}</div><div class="section-header fade-in-d3"><span>📈 Fases</span></div><div class="phases-list fade-in-d3">${ps}</div><button class="btn-measure fade-in-d4" onclick="openMeasureModal(${day})">📏 Registrar medidas</button><div class="settings-section fade-in-d4"><div class="section-header" style="margin-top:24px"><span>⚙️ Conta</span></div><div class="settings-info"><div class="settings-row"><span>👤</span> ${currentUser.name}</div><div class="settings-row"><span>📧</span> ${currentUser.email}</div></div><button class="btn-secondary-sm" onclick="openChangePwModal()">Alterar senha</button><button class="btn-text-danger" onclick="logoutUser()" style="margin-top:8px">Sair da conta</button><button class="btn-text-danger" onclick="resetApp()" style="margin-top:4px;margin-bottom:32px;opacity:0.4">Resetar protocolo</button></div></div>`;
}

/* ============ 12. MODALS ============ */

function openWorkoutModal(day) {
  const w=getWorkout(day),phase=getPhaseForDay(day),done=appState.completedTasks[`day${day}_workout`],p=appState.profile;
  const m=document.createElement('div');m.className='modal-overlay';
  m.innerHTML=`<div class="modal-sheet"><div class="modal-handle" onclick="closeModal()"></div><div class="modal-scroll"><div class="workout-header" style="--phase-color:${phase.color}"><div class="wk-name">${w.name}</div><div class="wk-info">${w.rounds} rodadas · ${w.rest}s descanso · ~${p.timeAvailable}min</div></div><div class="wk-section-title">Exercícios</div>${w.exercises.map((ex,i)=>`<div class="wk-exercise"><div class="wk-ex-num">${i+1}</div><div class="wk-ex-info"><div class="wk-ex-name">${ex.icon} ${ex.name} <span class="wk-ex-reps">${ex.reps}</span></div><div class="wk-ex-desc">${ex.desc}</div></div></div>`).join('')}<div class="wk-rest-note">⏱️ Descanse ${w.rest}s entre exercícios · Repita ${w.rounds}x</div><div class="wk-section-title">Alongamento</div>${w.cooldown.map(ex=>`<div class="wk-exercise cool"><div class="wk-ex-info"><div class="wk-ex-name">${ex.icon} ${ex.name} <span class="wk-ex-reps">${ex.reps}</span></div><div class="wk-ex-desc">${ex.desc}</div></div></div>`).join('')}<button class="btn-primary btn-large ${done?'btn-done':''}" onclick="toggleTask(${day},'workout');closeModal()">${done?'✓ Concluído!':'Completar treino'}</button></div></div>`;
  document.body.appendChild(m);requestAnimationFrame(()=>m.classList.add('open'));
}

function openSwapModal(day,mealType) {
  const phase=getPhaseForDay(day),p=appState.profile;
  let pool=MEALS_DB[mealType].filter(m=>m.phase.includes(phase.id));
  if(p.restrictions&&p.restrictions.length){const f=pool.filter(m=>{if(p.restrictions.includes('gluten')&&!m.tags.includes('gluten-free'))return false;if(p.restrictions.includes('lactose')&&!m.tags.includes('lactose-free'))return false;if(p.restrictions.includes('vegetarian')&&!m.tags.includes('vegetarian')&&!m.tags.includes('vegan'))return false;if(p.restrictions.includes('vegan')&&!m.tags.includes('vegan'))return false;return true;});if(f.length>=2)pool=f;}
  const cur=pickMeal(mealType,day,phase),tl={breakfast:'Café',lunch:'Almoço',dinner:'Jantar',snacks:'Lanche'};
  const m=document.createElement('div');m.className='modal-overlay';
  m.innerHTML=`<div class="modal-sheet"><div class="modal-handle" onclick="closeModal()"></div><div class="modal-scroll"><h3 class="modal-title">Trocar ${tl[mealType]}</h3><div class="swap-options">${pool.map(x=>`<div class="swap-option ${x.id===cur.id?'active':''}" onclick="swapMeal(${day},'${mealType}','${x.id}')"><div class="swap-name">${x.name}</div><div class="swap-desc">${x.desc}</div><div class="swap-meta">${x.cal}kcal${x.prep?' · '+x.prep+'min':''}</div></div>`).join('')}</div></div></div>`;
  document.body.appendChild(m);requestAnimationFrame(()=>m.classList.add('open'));
}

function openMeasureModal(day) {
  const last=appState.measurements[appState.measurements.length-1];
  const m=document.createElement('div');m.className='modal-overlay';
  m.innerHTML=`<div class="modal-sheet"><div class="modal-handle" onclick="closeModal()"></div><div class="modal-scroll"><h3 class="modal-title">📏 Registrar Medidas</h3><p class="modal-sub">Último: ${last?last.weight+'kg':'-'}</p><div class="measure-fields"><div class="m-field"><label>Peso (kg)</label><input type="number" id="mWeight" placeholder="${last?last.weight:''}" inputmode="decimal"></div><div class="m-field"><label>Cintura (cm)</label><input type="number" id="mWaist" placeholder="${last?.waist||''}" inputmode="decimal"></div></div><button class="btn-primary btn-large" onclick="saveMeasure(${day})">Salvar</button></div></div>`;
  document.body.appendChild(m);requestAnimationFrame(()=>m.classList.add('open'));
}

function openChangePwModal() {
  const m=document.createElement('div');m.className='modal-overlay';
  m.innerHTML=`<div class="modal-sheet"><div class="modal-handle" onclick="closeModal()"></div><div class="modal-scroll"><h3 class="modal-title">🔒 Alterar Senha</h3><div class="measure-fields"><div class="m-field"><label>Senha atual</label><input type="password" id="cpCur"></div><div class="m-field"><label>Nova senha</label><input type="password" id="cpNew" placeholder="Mín 6 caracteres"></div><div class="m-field"><label>Confirmar</label><input type="password" id="cpNew2"></div></div><div id="cpError" class="auth-error"></div><button class="btn-primary btn-large" onclick="handleChangePw()">Salvar</button></div></div>`;
  document.body.appendChild(m);requestAnimationFrame(()=>m.classList.add('open'));
}

function handleChangePw() {
  const c=document.getElementById('cpCur')?.value,n=document.getElementById('cpNew')?.value,n2=document.getElementById('cpNew2')?.value,err=document.getElementById('cpError');
  if(n!==n2){if(err){err.textContent='Senhas não coincidem';err.style.display='block';}return;}
  const r=changePassword(c,n);if(!r.ok){if(err){err.textContent=r.msg;err.style.display='block';}return;}
  closeModal();showToast('Senha alterada! 🔒');
}

function closeModal(){document.querySelectorAll('.modal-overlay').forEach(m=>{m.classList.remove('open');setTimeout(()=>m.remove(),300);});}

/* ============ 13. ACTIONS ============ */

function toggleTask(day,taskId){const k=`day${day}_${taskId}`;appState.completedTasks[k]=!appState.completedTasks[k];saveState();if(getDayTasks(day).every(t=>appState.completedTasks[`day${day}_${t.id}`]))showCelebration(day);render();}

function swapMeal(day,mt,mid){appState.swappedMeals[`day${day}_${mt}`]=mid;Object.keys(appState.completedTasks).filter(k=>k.startsWith(`day${day}_`)&&MEALS_DB[mt].some(m=>k.endsWith(m.id))).forEach(k=>delete appState.completedTasks[k]);saveState();closeModal();render();}

function saveMeasure(day){const w=parseFloat(document.getElementById('mWeight')?.value),ws=parseFloat(document.getElementById('mWaist')?.value)||null;if(!w){showToast('Informe o peso');return;}appState.measurements.push({day,date:new Date().toISOString().split('T')[0],weight:w,waist:ws});appState.completedTasks[`day${day}_measure`]=true;saveState();closeModal();showToast('Medidas salvas! 📏');render();}

function toggleWater(c){const t=new Date().toISOString().split('T')[0],cur=appState.waterLog[t]||0;appState.waterLog[t]=c===cur?c-1:c;saveState();render();}

function getWeightChange(){if(appState.measurements.length<2)return'-';const f=appState.measurements[0].weight,l=appState.measurements[appState.measurements.length-1].weight,d=l-f;return`${d>0?'+':''}${d.toFixed(1)}kg`;}

/* ============ 14. HELPERS ============ */

function getGreeting(){const h=new Date().getHours();if(h<12)return'Bom dia ☀️';if(h<18)return'Boa tarde 🌤️';return'Boa noite 🌙';}

function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);requestAnimationFrame(()=>t.classList.add('show'));setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},2500);}

function showCelebration(day){const phase=getPhaseForDay(day),we=getDayOfWeek(day)===7;const o=document.createElement('div');o.className='celebration-overlay';o.innerHTML=`<div class="celebration-card"><div class="cel-emoji">${we?'⭐':'🎉'}</div><h3>${we?`Semana ${Math.ceil(day/7)} completa!`:`Dia ${day} concluído!`}</h3><p>${we?`Fase ${phase.name} finalizada!`:'Excelente trabalho!'}</p><button class="btn-primary" onclick="this.closest('.celebration-overlay').remove()">Continuar 💪</button></div>`;document.body.appendChild(o);}

function resetApp(){if(confirm('Tem certeza? Todo progresso será perdido.')){localStorage.removeItem(getUserStorageKey());appState=getDefaultState();onboardingStep=0;onboardingData={};render();}}

/* ============ 15. INIT ============ */
initState();
render();
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.addEventListener('click',e=>{if(e.target.classList.contains('modal-overlay'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Enter'){if(document.getElementById('authPassword'))handleLogin();else if(document.getElementById('regPassword2'))handleRegister();}});
  </script>
</body>
</html>
